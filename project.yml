name: LinguaDaily
options:
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.linguadaily.app
    SWIFT_VERSION: 5.10
targets:
  LinguaDaily:
    type: application
    platform: iOS
    sources:
      - path: LinguaDaily
    configFiles:
      Debug: Config/AppConfig.xcconfig
      Release: Config/AppConfig.xcconfig
    settings:
      base:
        INFOPLIST_FILE: LinguaDaily/Resources/Info.plist
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    dependencies:
      - package: Supabase
      - package: RevenueCat
      - package: PostHog
      - package: Sentry
      - package: GoogleSignIn
    postBuildScripts:
      - name: Upload Debug Symbols to Sentry
        shell: /bin/sh
        inputFiles:
          - $(DWARF_DSYM_FOLDER_PATH)/$(DWARF_DSYM_FILE_NAME)/Contents/Resources/DWARF/$(TARGET_NAME)
        script: |
          # This script is responsible for uploading debug symbols and source context for Sentry.
          if which sentry-cli >/dev/null; then
            export SENTRY_ORG=anthonyshadow
            export SENTRY_PROJECT=apple-ios
            if [ -n "$SENTRY_AUTH_TOKEN" ]; then
              export SENTRY_AUTH_TOKEN
            fi
            ERROR=$(sentry-cli debug-files upload --include-sources "$DWARF_DSYM_FOLDER_PATH" 2>&1 >/dev/null)
            if [ ! $? -eq 0 ]; then
              echo "warning: sentry-cli - $ERROR"
            fi
          else
            echo "warning: sentry-cli not installed, download from https://github.com/getsentry/sentry-cli/releases"
          fi
  LinguaDailyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LinguaDaily
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.2.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: 5.14.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.14.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.46.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
schemes:
  LinguaDaily:
    build:
      targets:
        LinguaDaily: all
    test:
      targets:
        - LinguaDailyTests
