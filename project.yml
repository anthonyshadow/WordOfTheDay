name: LinguaDaily
options:
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.linguadaily.app
    SWIFT_VERSION: 5.10
targets:
  LinguaDaily:
    type: application
    platform: iOS
    sources:
      - path: LinguaDaily
    configFiles:
      Debug: Config/AppConfig.xcconfig
      Release: Config/AppConfig.xcconfig
    settings:
      base:
        INFOPLIST_FILE: LinguaDaily/Resources/Info.plist
    dependencies:
      - package: Supabase
      - package: RevenueCat
      - package: PostHog
      - package: Sentry
      - package: GoogleSignIn
  LinguaDailyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: LinguaDaily
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: 2.2.0
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm
    from: 5.14.0
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.14.0
  Sentry:
    url: https://github.com/getsentry/sentry-cocoa
    from: 8.46.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0
schemes:
  LinguaDaily:
    build:
      targets:
        LinguaDaily: all
    test:
      targets:
        - LinguaDailyTests
